<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up form</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="ilustracion">
        <img src="https://images.unsplash.com/photo-1585202900225-6d3ac20a6962?q=80&w=774&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt="ilustracion">
        <div class="logo">
            <img class="odin"
                src="https://raw.githubusercontent.com/TheOdinProject/curriculum/5f37d43908ef92499e95a9b90fc3cc291a95014c/html_css/project-sign-up-form/odin-lined.png"
                alt="Imagen Odin">
            <p class="marca">ODIN</p>
        </div>
    </div>
    <div class="contenido">
        <div class="primero">
            <p>This is not a real online service! You know you need something like this in your life to help you realize
                your deepest dreams. Sign up <em> now </em> to get started.</p>
            <p>You <em> know </em> you want to.</p>
        </div>
        <div class="segundo">
            <p class="titulo_formulario">Let´s do this!</p>
            <div class="formulario">
                <form action="#" method="post">
                    <div>
                        <label for="first_name">First Name:</label>
                        <input type="text" id="first_name" name="first_name">
                    </div>
                    <div>
                        <label for="last_name">Last Name:</label>
                        <input type="text" id="last_name" name="last_name">
                    </div>
                    <div>
                        <label for="correo">Email:</label>
                        <input type="email" id="correo" name="correo">
                    </div>
                    <div>
                        <label for="telefono">Phone Number:</label>
                        <input type="tel" id="telefono" name="telefono" pattern="[0-9]{9}">
                    </div>
                    <div>
                        <label for="contraseña">Password:</label>
                        <input type="password" id="contraseña" name="contraseña">
                    </div>
                    <div>
                        <label for="confirmar_contraseña">Confirm Password:</label>
                        <input type="password" id="confirmar_contraseña" name="confirmar_contraseña">
                    </div>
                    <button type="submit">Create Account</button>
                </form>
            </div>
            <p class="no_cuenta">Already have an account? Log in</p>
        </div>
    </div>
</body>

</html>
